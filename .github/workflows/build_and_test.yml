# GitHub Action workflow to build and test the library
#

name: Build and test pysap

on: [push, pull_request]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  health:
    name: Check code health
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pysap
        uses: actions/checkout@v6
      - name: Setup Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: requirements-lint.txt
      - name: Run lint tests
        run: |
          python -m tox -e lint-core

  test:
    name: Run unit tests and build wheel
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        experimental: [false]
        include:
          - os: windows-latest
            python-version: "3.14"
            experimental: true
    steps:
      - name: Checkout pysap
        uses: actions/checkout@v6
      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-test.txt

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install openssl libdnet libpcap

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-test.txt
      - name: Install the library
        run: |
          python -m pip install -e .

      - name: Run unit tests
        run: |
          python -m tox -e unit -- --maxfail=1

      - name: Build wheel artifact
        run: |
          python -m pip install build
          python -m build --wheel
      - name: Upload wheel artifact
        uses: actions/upload-artifact@v7
        with:
          name: packages-${{ matrix.os }}-${{ matrix.python-version }}
          path: dist/*.whl
          if-no-files-found: error

  docs:
    name: Build documentation and source package
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10"]
    steps:
      - name: Checkout pysap
        uses: actions/checkout@v6
      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-docs.txt
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-latex-base ghostscript
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          python -m pip install -r requirements-docs.txt
      - name: Install the library
        run: |
          python -m pip install -e .

      - name: Build documentation
        run: |
          python -m sphinx -b html docs docs/_build/html

      - name: Upload documentation artifact
        uses: actions/upload-artifact@v7
        with:
          name: docs-html
          path: docs/_build/html
          if-no-files-found: error

      - name: Build source artifact
        run: |
          python -m pip install build
          python -m build --sdist

      - name: Upload source artifact
        uses: actions/upload-artifact@v7
        with:
          name: packages-sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  integration:
    name: Run integration tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10"]
    steps:
      - name: Checkout pysap
        uses: actions/checkout@v6
      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-test.txt
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-test.txt
      - name: Install the library
        run: |
          python -m pip install -e .
      - name: Run integration tests
        run: |
          python -m tox -e integration -- --maxfail=1

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [health, test, docs, integration]
    permissions:
      contents: write
    env:
       GH_TOKEN: ${{ github.token }}
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
    steps:
       - name: Download artifacts
         uses: actions/download-artifact@v8
         with:
            pattern: packages-*
            path: dist
            merge-multiple: true
       - name: Create release and upload assets
         run: |
            gh release create "${GITHUB_REF_NAME}" \
              --repo "${GITHUB_REPOSITORY}" \
              --draft \
              --title "pysap ${GITHUB_REF_NAME}" \
              --generate-notes \
              dist/*
